[build]
  publish = "."
  functions = "netlify/functions"

# Перенаправление заявок с форм в функцию обработки
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Уведомления при отправке форм
# (Настроить в Netlify Dashboard → Forms → Notifications)

# Заголовки безопасности
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Кэширование статики
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Красивые URL (без .html)
[[redirects]]
  from = "/catalog"
  to   = "/catalog.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/contacts"
  to   = "/contacts.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# Форма → функция (для Telegram + Bitrix24)
# Активировать после настройки переменных окружения:
# [[redirects]]
#   from = "/"
#   to   = "/.netlify/functions/form-submission"
#   status = 200
#   conditions = {Role = ["admin"]}
